<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display · Hanoosh Café</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="orders.css">
</head>

<body>

    <!-- Login Gate -->
    <div class="login-gate" id="loginGate">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-mark">H</span>
                <div>
                    <div class="logo-text">Hanoosh <em>Café</em></div>
                    <div class="logo-sub">Kitchen Display</div>
                </div>
            </div>
            <h1>Staff Login</h1>
            <p class="login-sub">Enter password to access the kitchen display</p>
            <div class="login-form">
                <input type="password" id="adminPass" placeholder="Password" autofocus>
                <button class="btn-primary" id="btnLogin">
                    <span>Unlock</span>
                </button>
            </div>
            <p class="login-hint" id="loginError"></p>
            <a href="index.html" class="back-home">← Back to site</a>
        </div>
    </div>

    <!-- Main -->
    <div class="kd-wrap" id="kdWrap" style="display:none">

        <!-- Top bar -->
        <header class="kd-head">
            <div class="kd-brand">
                <span class="logo-mark">H</span>
                <div>
                    <div class="kd-title">Kitchen Display</div>
                    <div class="kd-sub">Hanoosh Café</div>
                </div>
            </div>

            <div class="kd-filters">
                <button class="kd-tab active" data-tab="active">
                    <span class="kd-dot kd-dot-active"></span>
                    <span>Active</span>
                    <span class="kd-count" id="countActive">0</span>
                </button>
                <button class="kd-tab" data-tab="preparing">
                    <span class="kd-dot kd-dot-prep"></span>
                    <span>Preparing</span>
                    <span class="kd-count" id="countPrep">0</span>
                </button>
                <button class="kd-tab" data-tab="ready">
                    <span class="kd-dot kd-dot-ready"></span>
                    <span>Ready</span>
                    <span class="kd-count" id="countReady">0</span>
                </button>
                <button class="kd-tab" data-tab="history">
                    <span>📜</span>
                    <span>History</span>
                </button>
                <span class="kd-divider"></span>
                <button class="kd-tab" data-tab="reservations">
                    <span>📅</span>
                    <span>Reservations</span>
                    <span class="kd-count" id="countRes">0</span>
                </button>
            </div>

            <div class="kd-tools">
                <button class="kd-tool" id="btnSound" title="Toggle sound">
                    <svg id="iconSoundOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    <svg id="iconSoundOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                </button>
                <div class="kd-clock" id="kdClock">--:--</div>
                <button class="kd-tool kd-logout" id="btnLogout" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Orders grid -->
        <main class="kd-main" id="kdMain"></main>
    </div>

    <!-- Hidden audio for beep -->
    <audio id="beepSound" preload="auto">

    <script src="orders.js"></script>
</body>

</html>
